<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h2>Click to generate and download icons</h2>
<button onclick="generateIcons()">Generate Icons</button>
<canvas id="c" style="display:none"></canvas>
<script>
function generateIcons() {
    [192, 512].forEach(size => {
        const canvas = document.getElementById('c');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        // Gradient background
        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, '#0080FF');
        grad.addColorStop(1, '#8B00FF');
        // Rounded rect
        const r = size * 0.18;
        ctx.beginPath();
        ctx.moveTo(r, 0); ctx.lineTo(size-r, 0); ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size-r); ctx.quadraticCurveTo(size, size, size-r, size);
        ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size-r);
        ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.fillStyle = grad; ctx.fill();
        // Plane icon
        ctx.fillStyle = 'white';
        ctx.font = `bold ${size*0.35}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\u2708', size/2, size*0.38);
        // Text
        ctx.font = `bold ${size*0.13}px Arial`;
        ctx.fillText('TravelGo', size/2, size*0.72);
        // Download
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `icon-${size}.png`;
        a.click();
    });
}
</script>
</body>
</html>
